    <!-- Main Content -->
    <div class="container mt-4">
      <div class="row">
	<div class="col-md-12" id="content">
          <h2>Employees</h2>
          <p>Loading...</p>
	</div>
      </div>
    </div>

    <script>
     (async function() {
	 const qs = window.location.search;
	 const url = "/api/employees" + qs;

	 try {
             const response = await fetch(url);
             if (!response.ok) {
		 const errorData = await response.json();
		 throw new Error(`HTTP ${response.status}: ${errorData.error}`);
             }
             const employees = await response.json();
             console.log('Employees fetched:', employees);
             const content = document.getElementById('content');
             content.innerHTML = '<h2>Employees</h2>';
             if (employees.length === 0) {
		 content.innerHTML += '<p>No employees found.</p>';
		 return;
             }
             let html = '<table class="table table-striped"><thead><tr><th>Employee Num</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Department</th><th>Manager</th></tr></thead><tbody>';
             employees.forEach(emp => {
		 console.log('Processing employee:', emp);
		 html += `<tr><td>${emp.employeeNum}</td><td>${emp.firstName}</td><td>${emp.lastName}</td><td>${emp.email}</td><td>${emp.department}</td><td>${emp.isManager ? 'Yes' : 'No'}</td></tr>`;
             });
             html += '</tbody></table>';
             content.innerHTML += html;
             console.log('Employees table rendered.');
	 } catch (error) {
             console.error('Error loading employees:', error);
             document.getElementById('content').innerHTML = '<h2>Employees</h2><p>Error loading employees.</p>';
	 }
     })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
