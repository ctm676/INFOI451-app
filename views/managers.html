    <div class="container">
      <span class="navbar-brand">INFO - Chase Miller, Devin Moredock</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" aria-current="page" href="./">Home</a>

          <li class="nav-item">

  <!-- Main Content -->
  <div class="container mt-4">
    <div class="row">
      <!-- Left Column -->
      <div class="col-md-12">
        <div id="content"></div>
        <script>
          (async function () {
            try {
              const response = await fetch('/api/managers');
              if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`HTTP ${response.status}: ${errorData.error}`);
              }
              const managers = await response.json();
              console.log('Managers fetched:', managers);
              const content = document.getElementById('content');
              content.innerHTML = '<h2>Managers</h2>';
              if (managers.length === 0) {
                content.innerHTML += '<p>No managers found.</p>';
                return;
              }
              let html = '<table class="table table-striped"><thead><tr><th>Employee Num</th><th>First Name</th><th>Last Name</th><th>Email</th><th>Department</th></tr></thead><tbody>';
              managers.forEach(mgr => {
                console.log('Processing manager:', mgr);
                html += `<tr><td>${mgr.employeeNum}</td><td>${mgr.firstName}</td><td>${mgr.lastName}</td><td>${mgr.email}</td><td>${mgr.department}</td></tr>`;
              });
              html += '</tbody></table>';
              content.innerHTML += html;
              console.log('Managers table rendered.');
            } catch (error) {
              console.error('Error loading managers:', error);
              document.getElementById('content').innerHTML = '<h2>Managers</h2><p>Error loading managers.</p>';
            }
          })();
        </script>
      </div>
    </div>
</body>

</html>
