  <div class="container mt-4">

      <h1>Images</h1>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('/images')
      .then(response => response.json())
      .then(data => {
        document.getElementById('imagesJson').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
      })
      .catch(error => {
        console.error('Error fetching images:', error);
        document.getElementById('imagesJson').innerHTML = '<p>Error loading images.</p>';
      });
  </script>
